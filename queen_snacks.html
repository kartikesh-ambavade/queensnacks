<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Queen Snacks</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #D85A30;
      --brand-dark: #993C1D;
      --gold: #F5C842;
      --bg: #FDF8F3;
      --surface: #FFFFFF;
      --text: #1A1208;
      --muted: #7A6A58;
      --border: rgba(0,0,0,0.08);
      --radius: 16px;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }
    .logo .crown { color: var(--gold); font-size: 1.4rem; }
    .logo .highlight { color: var(--brand); }

    .cart-trigger {
      background: var(--brand);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 10px 20px;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      transition: background 0.2s, transform 0.1s;
    }
    .cart-trigger:hover { background: var(--brand-dark); }
    .cart-trigger:active { transform: scale(0.97); }
    .cart-trigger .count {
      background: var(--gold);
      color: var(--text);
      border-radius: 50%;
      width: 20px; height: 20px;
      font-size: 12px; font-weight: 500;
      display: flex; align-items: center; justify-content: center;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 3.5rem 1.5rem 2rem;
      background: radial-gradient(ellipse at 50% 0%, #FFECD8 0%, var(--bg) 70%);
    }
    .hero-tag {
      display: inline-block;
      background: var(--gold);
      color: var(--text);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 50px;
      margin-bottom: 1rem;
    }
    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      font-weight: 900;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 0.75rem;
    }
    .hero h1 em { color: var(--brand); font-style: normal; }
    .hero p {
      color: var(--muted);
      font-size: 16px;
      max-width: 380px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* PRODUCTS */
    .products-section { padding: 2rem 1.5rem 3rem; max-width: 900px; margin: 0 auto; }
    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      display: flex; flex-direction: column; gap: 12px;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .product-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); transform: translateY(-2px); }

    .product-emoji-wrap {
      width: 56px; height: 56px;
      background: #FFF0E6;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .product-name { font-size: 17px; font-weight: 500; color: var(--text); }
    .product-price { font-size: 14px; color: var(--muted); }
    .product-price strong { color: var(--brand); font-size: 16px; }

    .qty-controls {
      display: flex; align-items: center; gap: 8px; margin-top: auto;
    }
    .qty-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg);
      cursor: pointer;
      font-size: 18px; font-weight: 500;
      display: flex; align-items: center; justify-content: center;
      color: var(--text);
      transition: background 0.15s;
      line-height: 1;
    }
    .qty-btn:hover { background: #F0E0D0; }
    .qty-num {
      font-size: 16px; font-weight: 500;
      min-width: 24px; text-align: center;
      color: var(--text);
    }
    .add-btn {
      flex: 1;
      background: var(--brand);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 8px 0;
      font-family: var(--font-body);
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .add-btn:hover { background: var(--brand-dark); }

    /* CART DRAWER */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
    }
    .overlay.active { opacity: 1; pointer-events: all; }

    .cart-drawer {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: min(380px, 100vw);
      background: var(--surface);
      z-index: 201;
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      box-shadow: -8px 0 32px rgba(0,0,0,0.1);
    }
    .cart-drawer.open { transform: translateX(0); }

    .drawer-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .drawer-title {
      font-family: var(--font-display);
      font-size: 1.3rem; font-weight: 700;
    }
    .close-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 34px; height: 34px;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      transition: background 0.15s;
    }
    .close-btn:hover { background: #F0E0D0; color: var(--text); }

    .cart-items { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; }
    .cart-empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 15px;
    }
    .cart-empty .big { font-size: 3rem; margin-bottom: 0.75rem; }

    .cart-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .cart-item:last-child { border-bottom: none; }
    .ci-left { display: flex; align-items: center; gap: 10px; }
    .ci-emoji { font-size: 22px; }
    .ci-name { font-size: 14px; font-weight: 500; }
    .ci-qty { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .ci-price { font-size: 14px; font-weight: 500; color: var(--brand); }

    .cart-footer {
      padding: 1.25rem 1.5rem;
      border-top: 1px solid var(--border);
    }
    .total-row {
      display: flex; justify-content: space-between;
      font-size: 18px; font-weight: 500;
      margin-bottom: 1rem;
    }
    .total-amt { color: var(--brand); font-family: var(--font-display); font-weight: 700; }

    .wa-btn {
      width: 100%;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px;
      font-family: var(--font-body);
      font-size: 15px; font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background 0.2s, transform 0.1s;
    }
    .wa-btn:hover { background: #1da851; }
    .wa-btn:active { transform: scale(0.98); }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 480px) {
      .products-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .hero { padding: 2.5rem 1rem 1.5rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="crown">👑</span>
    <span><span class="highlight">Queen</span> Snacks</span>
  </div>
  <button class="cart-trigger" onclick="openCart()">
    🛒 Cart
    <span class="count" id="badge">0</span>
  </button>
</header>

<section class="hero">
  <div class="hero-tag">Fresh & Tasty</div>
  <h1>Snacks fit for<br/>a <em>Queen</em> 👑</h1>
  <p>Order your favourites and get them delivered — quick, easy, and delicious.</p>
</section>

<section class="products-section">
  <p class="section-label">Our snacks</p>
  <div class="products-grid" id="products"></div>
</section>

<div class="overlay" id="overlay" onclick="closeCart()"></div>

<div class="cart-drawer" id="cartDrawer">
  <div class="drawer-header">
    <span class="drawer-title">Your order 🛒</span>
    <button class="close-btn" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="total-row">
      <span>Total</span>
      <span class="total-amt" id="totalAmt">₹0</span>
    </div>
    <button class="wa-btn" onclick="orderOnWhatsApp()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Order on WhatsApp
    </button>
  </div>
</div>

<footer>© 2026 Queen Snacks · Made with ❤️ in Pune</footer>

<script>
  const PHONE = "919921617062";
  const products = [
    { id: 1, name: "Disco",  price: 100, emoji: "🍬" },
    { id: 2, name: "Bobby",  price: 100, emoji: "🍿" },
    { id: 3, name: "Star",   price: 40,  emoji: "⭐" },
  ];
  const cart = {};

  function renderProducts() {
    document.getElementById("products").innerHTML = products.map(p => `
      <div class="product-card">
        <div class="product-emoji-wrap">${p.emoji}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price"><strong>₹${p.price}</strong></div>
        <div class="qty-controls">
          <button class="qty-btn" onclick="change(${p.id},-1)">−</button>
          <span class="qty-num" id="q${p.id}">0</span>
          <button class="qty-btn" onclick="change(${p.id},1)">+</button>
          <button class="add-btn" onclick="add(${p.id})">Add</button>
        </div>
      </div>
    `).join("");
  }

  function change(id, delta) {
    cart[id] = Math.max(0, (cart[id] || 0) + delta);
    document.getElementById("q" + id).textContent = cart[id];
    updateBadge();
    renderCart();
  }

  function add(id) {
    cart[id] = (cart[id] || 0) + 1;
    document.getElementById("q" + id).textContent = cart[id];
    updateBadge();
    openCart();
  }

  function updateBadge() {
    document.getElementById("badge").textContent = Object.values(cart).reduce((a, b) => a + b, 0);
  }

  function openCart() {
    document.getElementById("cartDrawer").classList.add("open");
    document.getElementById("overlay").classList.add("active");
    renderCart();
  }

  function closeCart() {
    document.getElementById("cartDrawer").classList.remove("open");
    document.getElementById("overlay").classList.remove("active");
  }

  function renderCart() {
    const items = products.filter(p => cart[p.id] > 0);
    const el = document.getElementById("cartItems");
    if (!items.length) {
      el.innerHTML = `<div class="cart-empty"><div class="big">🛒</div>Your cart is empty.<br/>Add some snacks!</div>`;
      document.getElementById("totalAmt").textContent = "₹0";
      return;
    }
    el.innerHTML = items.map(p => `
      <div class="cart-item">
        <div class="ci-left">
          <span class="ci-emoji">${p.emoji}</span>
          <div>
            <div class="ci-name">${p.name}</div>
            <div class="ci-qty">${cart[p.id]} × ₹${p.price}</div>
          </div>
        </div>
        <span class="ci-price">₹${cart[p.id] * p.price}</span>
      </div>
    `).join("");
    document.getElementById("totalAmt").textContent = "₹" + items.reduce((s, p) => s + cart[p.id] * p.price, 0);
  }

  function orderOnWhatsApp() {
    const items = products.filter(p => cart[p.id] > 0);
    if (!items.length) { alert("Please add items to your cart first!"); return; }
    const total = items.reduce((s, p) => s + cart[p.id] * p.price, 0);
    let msg = "Hello Queen Snacks! I'd like to order:\n\n";
    items.forEach(p => { msg += `• ${p.name} x${cart[p.id]} = ₹${cart[p.id] * p.price}\n`; });
    msg += `\nTotal: ₹${total}\n\nPlease confirm my order!`;
    window.open(`https://wa.me/${PHONE}?text=${encodeURIComponent(msg)}`, "_blank");
  }

  renderProducts();
</script>
</body>
</html>
